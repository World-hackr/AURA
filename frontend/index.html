<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Circuit Designer</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/core/layout.css">
    <link rel="stylesheet" href="css/core/workspace.css">
    <link rel="stylesheet" href="css/ui/tools.css">
</head>
<body>

    <div id="ui-root">
        <!-- LEFT TOOLS PANEL -->
        <aside id="left-panel" class="tools-panel">
            <div class="panel-header">
                <div class="header-title-group">
                    <h2>AURA</h2>
                    <span class="version">v0.1.0</span>
                </div>

                <div class="settings-hub">
                    <!-- GRID SETTINGS -->
                    <div class="expand-tool" title="Grid Settings">
                        <div class="tool-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M2,2H22V22H2M4,4V20H20V4H4M6,6H10V10H6V6M14,6H18V10H14V6M6,14H10V18H6V14M14,14H18V18H14V14"/></svg>
                        </div>
                        <div class="tool-content">
                            <div class="tool-label">Grid</div>
                            <input type="range" id="grid-res-slider" min="5" max="50" value="10" oninput="setGridResolution(this.value)" style="width: 80px;">
                            <span id="grid-val-display" class="value" style="font-size: 10px; color: var(--text-main);">10px/u</span>
                        </div>
                    </div>

                    <!-- WIRE SETTINGS -->
                    <div class="expand-tool" title="Wire Style">
                        <div class="tool-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M16 12l2.5-2.5-2.5-2.5L14.5 8.5l1 1H10v1h5.5l-1 1z"/></svg>
                        </div>
                        <div class="tool-content">
                            <div class="tool-label">Wire Width</div>
                            <input type="range" id="wire-width-slider" min="1" max="12" value="4" oninput="setWireWidth(this.value)" style="width: 80px;">
                            <span id="wire-width-display" class="value" style="font-size: 10px; color: var(--text-main);">4px</span>
                            <div class="tool-label" style="margin-top: 8px;">Wire Color</div>
                            <div class="accent-palette-mini">
                                <div class="color-dot-mini" style="background: #f44336;" onclick="setWireColor('#f44336')"></div>
                                <div class="color-dot-mini" style="background: #2196F3;" onclick="setWireColor('#2196F3')"></div>
                                <div class="color-dot-mini" style="background: #4CAF50;" onclick="setWireColor('#4CAF50')"></div>
                                <div class="color-dot-mini" style="background: #FFC107;" onclick="setWireColor('#FFC107')"></div>
                                <div class="color-dot-mini" style="background: #212121;" onclick="setWireColor('#212121')"></div>
                            </div>
                        </div>
                    </div>

                    <!-- BACKGROUND SETTINGS -->
                    <div class="expand-tool" title="Background Reference">
                        <div class="tool-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8.5,13.5L11,16.5L14.5,12L19,18H5L8.5,13.5M21,19V5C21,3.89 20.1,3 19,3H5A2,2 0 0,0 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19M5,19V5H19V19H5Z"/></svg>
                        </div>
                        <div class="tool-content">
                            <div class="tool-label">Texture</div>
                            <div class="texture-grid-mini">
                                <button class="mini-texture-btn" onclick="setTexture('texture1.jpg')">T1</button>
                                <button class="mini-texture-btn" onclick="setTexture('texture2.jpg')">T2</button>
                                <button class="mini-texture-btn" onclick="setTexture('texture3.jpg')">T3</button>
                                <button class="mini-texture-btn" onclick="setTexture('texture4.jpg')">T4</button>
                            </div>
                        </div>
                    </div>

                    <!-- THEME & STYLE -->
                    <div class="expand-tool" title="Visual Style">
                        <div class="tool-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12,22C6.47,22 2,17.53 2,12C2,6.47 6.47,2 12,2C17.53,2 22,6.47 22,12C22,17.53 17.53,22 12,22M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18M7,12A1,1 0 0,0 6,13A1,1 0 0,0 7,14A1,1 0 0,0 8,13A1,1 0 0,0 7,12M17,12A1,1 0 0,0 16,13A1,1 0 0,0 17,14A1,1 0 0,0 18,13A1,1 0 0,0 17,12"/></svg>
                        </div>
                        <div class="tool-content" style="right: 0; left: auto;">
                            <style>
                                .expand-tool:last-child .tool-content::before {
                                    left: auto; right: 13px;
                                }
                            </style>
                            <div class="tool-label">Theme</div>
                            <div class="theme-switch-mini" style="margin-bottom: 8px;">
                                <button class="mini-pill-btn" onclick="setTheme('dark')">Dark</button>
                                <button class="mini-pill-btn" onclick="setTheme('blueprint')">Blue</button>
                                <button class="mini-pill-btn" onclick="setTheme('light')">Light</button>
                            </div>
                            <div class="tool-label">Accent</div>
                            <div class="accent-palette-mini">
                                <div class="color-dot-mini" style="background: #4a90e2;" onclick="setAccentColor('#4a90e2')"></div>
                                <div class="color-dot-mini" style="background: #4CAF50;" onclick="setAccentColor('#4CAF50')"></div>
                                <div class="color-dot-mini" style="background: #FF5722;" onclick="setAccentColor('#FF5722')"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tool-section flex-grow">
                <div class="section-title">Components</div>
                <div id="component-palette">
                    <!-- Dynamic buttons will be injected here -->
                    <div class="loading-text">Loading Parts...</div>
                </div>
            </div>

            <div class="tool-section">
                <div class="section-title">Calculations</div>
                <button onclick="alert('LED Calculation logic here...')">LED Resistor</button>
            </div>
        </aside>

        <div id="panel-resizer"></div>

        <!-- MAIN WORKSPACE -->
        <main id="workspace-container" class="workspace-panel">
            <canvas id="scale-overlay"></canvas>
            
            <!-- Elegant Workspace HUD (Outside the frame) -->
            <div id="workspace-hud">
                <div class="hud-group">
                    <div class="hud-slider-box">
                        <input type="range" id="grid-opacity-slider" min="0" max="100" value="40" oninput="setGridOpacity(this.value)" title="Grid Opacity">
                    </div>
                    <button class="hud-btn active" id="grid-toggle-btn" onclick="toggleGrid()" title="Toggle Grid Visibility">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/></svg>
                    </button>
                    <div class="hud-sep"></div>
                    <button class="hud-btn" onclick="resetOrigin()" title="Snap to Origin">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,10A2,2 0 0,0 10,12A2,2 0 0,0 12,14A2,2 0 0,0 14,12A2,2 0 0,0 12,10M10,22V20H14V22H10M22,10V14H20V10H22M2,10V14H4V10H2M10,2V4H14V2H10Z"/></svg>
                    </button>
                    <div class="hud-sep"></div>
                    <button id="bg-lock-btn" class="hud-btn" onclick="toggleTextureLock()" title="Align Background">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15,3H6C4.89,3 4,3.89 4,5V19C4,20.11 4.89,21 6,21H18C19.11,21 20,20.11 20,19V8L15,3M18,19H6V5H14V9H18V19M8,12V14H16V12H8M8,16V18H13V16H8Z"/></svg>
                    </button>
                    <div class="hud-sep"></div>
                    <button id="style-toggle-btn" class="hud-btn-text" onclick="toggleStyle()" title="Toggle Visual Style" style="font-size: 8px; font-weight: bold; width: auto; padding: 0 8px;">STYLE: SKETCHY</button>
                    <div class="hud-sep"></div>
                    <button class="hud-btn-text" onclick="generateNetlist()" title="Generate Netlist" style="font-size: 10px; font-weight: bold; width: auto; padding: 0 12px; color: #4CAF50;">SIMULATE</button>
                </div>
                <div id="status-group">
                    <div id="status-light"></div>
                    <span id="status-text">GRID</span>
                    <span id="coord-display">0u, 0u</span>
                </div>
            </div>

            <div id="workspace-frame" class="workspace-frame">
                <canvas id="workspace"></canvas>
            </div>
            
            <!-- RIGHT PROPERTY INSPECTOR PANEL -->
            <div id="property-inspector" class="inspector-panel" style="display: none;">
                <div class="inspector-header">
                    <h3 id="inspector-title">Component</h3>
                    <button class="close-inspector-btn" onclick="closeInspector()">&times;</button>
                </div>
                <div id="inspector-content" class="inspector-content">
                    <div class="empty-state">No component selected</div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/resistor_colors.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
